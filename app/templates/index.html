<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargador MP3</title>
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
    <link href="https://unpkg.com/nes.css/css/nes.css" rel="stylesheet" />
    <style>
        #loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        #loading img {
            width: 50px;
        }
        #enlace-descarga {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        #mensaje-error {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        body {
            font-family: "Press Start 2P", cursive;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 { color: #333; }
        form {
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        fieldset {
            border: none;
            padding: 0;
            margin-bottom: 20px;
        }
        legend {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        label { display: block; margin-bottom: 10px; }
        input {
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .small-select { display: inline-block; width: auto; }
        .small-select select {
            padding: 8px;
            width: 120px;
        }
        button {
            font-family: "Press Start 2P", cursive;
            width: 100%;
            padding: 10px;
        }
    </style>
    <script>
        let sessionId = "";

        function mostrarCarga() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('formulario').style.display = 'none';
            document.getElementById('enlace-descarga').style.display = 'none';
        }

        function ocultarCarga() {
            document.getElementById('loading').style.display = 'none';
        }

        function mostrarError(mensaje) {
            ocultarCarga();
            document.getElementById('mensaje-error').style.display = 'block';
            document.getElementById('mensaje-error').textContent = mensaje;
            document.getElementById('formulario').style.display = 'block';
        }

        function iniciarDescarga(event) {
            event.preventDefault();

            const url = document.getElementById('url').value;
            const formato = document.getElementById('formato').value;

            if (!url) return;

            sessionId = "";
            sessionStorage.removeItem('sessionId');

            mostrarCarga();

            fetch('/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: 'url=' + encodeURIComponent(url) + '&formato=' + encodeURIComponent(formato)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    mostrarError(data.error);
                } else if (data.session_id) {
                    sessionId = data.session_id;
                    sessionStorage.setItem('sessionId', sessionId);
                    verificarEstado();
                }
            })
            .catch(error => {
                mostrarError('Error al iniciar la descarga');
            });

            return false;
        }

        function verificarEstado() {
            if (!sessionId) return;

            fetch('/estado_descarga?session_id=' + sessionId)
                .then(response => response.json())
                .then(data => {
                    if (data.estado === 'completado' && data.archivo) {
                        ocultarCarga();
                        document.getElementById('url').value = '';
                        document.getElementById('formulario').style.display = 'block';
                        document.getElementById('enlace-descarga').style.display = 'block';
                        document.getElementById('btn-descargar').href = data.archivo;
                        sessionStorage.removeItem('sessionId');
                        sessionId = "";
                    } else if (data.estado === 'error') {
                        mostrarError(data.archivo || 'Error desconocido');
                    } else if (data.estado === 'descargando') {
                        document.getElementById('loading').querySelector('p:last-of-type').textContent = 'Descargando...';
                        setTimeout(verificarEstado, 3000);
                    } else if (data.estado === 'avance_cola') {
                        document.getElementById('loading').querySelector('p:last-of-type').textContent = 'Tu descarga ha avanzado. Nueva posición: ' + data.posicion;
                        setTimeout(verificarEstado, 3000);
                    } else if (data.estado === 'en_cola') {
                        document.getElementById('loading').querySelector('p:last-of-type').textContent = 'Posición en cola: ' + data.posicion;
                        setTimeout(verificarEstado, 5000);
                    } else {
                        setTimeout(verificarEstado, 2000);
                    }
                })
                .catch(error => {
                    setTimeout(verificarEstado, 2000);
                });
        }

        window.onload = function() {
            const form = document.getElementById('formulario');
            form.addEventListener('submit', iniciarDescarga);
        };
    </script>
</head>
<body>
    <h1 class="nes-text is-primary">Descargador MP3</h1>
    <form id="formulario" method="post" onsubmit="mostrarCarga()" class="nes-container with-title">
        <p class="title">Procesar URL</p>
        <fieldset>
            <legend>Introduce los datos</legend>
            <label for="url" class="nes-text">Introduce una URL:</label>
            <input type="text" id="url" name="url" class="nes-input" required>
            <label for="formato" class="nes-text">Elige formato:</label>
            <div class="nes-select small-select">
                <select id="formato" name="formato">
                    <option value="mp3" selected>MP3</option>
                    <option value="mp4">MP4</option>
                </select>
            </div>
        </fieldset>
        <button type="submit" class="nes-btn is-success">Procesar</button>
    </form>

    <div id="loading">
        <p class="nes-text is-warning">Procesando, por favor espera...</p>
        <p id="posicion-cola" class="nes-text"></p>
        <img src="https://i.gifer.com/5Q0v.gif" alt="Cargando..." style="width: 50%; height: auto;">
    </div>

    <div id="enlace-descarga">
        <p class="nes-text is-success">¡Archivo descargado correctamente!</p>
        <a href="#" id="btn-descargar" class="nes-btn is-primary">Descargar archivo generado</a>
    </div>

    <div id="mensaje-error" class="nes-text is-error"></div>

</body>
</html>
